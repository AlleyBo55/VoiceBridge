name: Build macOS (.dmg)

on:
  push:
    branches: [master, ci/github-workflows]

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Typecheck
        working-directory: desktop
        run: npm run typecheck

      - name: Build main + preload
        working-directory: desktop
        run: npm run build:main

      - name: Build renderer
        working-directory: desktop
        run: npm run build:renderer

      - name: Determine version
        id: version
        run: |
          VERSION=$(node -p "require('./desktop/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-macos" >> "$GITHUB_OUTPUT"

      - name: Package .dmg (x64 + arm64)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac

      - name: Rename artifacts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Rename both DMGs with clear architecture labels
          for dmg in desktop/release/*.dmg; do
            base=$(basename "$dmg")
            if echo "$base" | grep -q "arm64"; then
              cp "$dmg" "desktop/release/VoiceBridge-${VERSION}-macOS-arm64.dmg"
            else
              cp "$dmg" "desktop/release/VoiceBridge-${VERSION}-macOS-x64.dmg"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceBridge-macOS
          path: |
            desktop/release/VoiceBridge-*-macOS-*.dmg

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: VoiceBridge ${{ steps.version.outputs.version }} — macOS
          body: |
            ## macOS Installer

            | Chip | Download |
            |------|----------|
            | Apple Silicon (M1/M2/M3/M4) | `VoiceBridge-${{ steps.version.outputs.version }}-macOS-arm64.dmg` |
            | Intel | `VoiceBridge-${{ steps.version.outputs.version }}-macOS-x64.dmg` |

            Open the DMG and drag VoiceBridge to Applications.

            Requires macOS 12+ and [BlackHole 2ch](https://existential.audio/blackhole/) for virtual mic.

            ### First Launch

            Since VoiceBridge is not code-signed yet, macOS Gatekeeper will block it. After dragging to Applications, open Terminal and run:

            ```
            xattr -cr /Applications/VoiceBridge.app
            ```

            Then open VoiceBridge normally.
          draft: false
          prerelease: false
          files: |
            desktop/release/VoiceBridge-${{ steps.version.outputs.version }}-macOS-arm64.dmg
            desktop/release/VoiceBridge-${{ steps.version.outputs.version }}-macOS-x64.dmg

      - name: Update latest-macos tag
        if: github.ref == 'refs/heads/master'
        run: |
          git tag -f latest-macos
          git push -f origin latest-macos
